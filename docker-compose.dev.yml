services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    env_file: ".env"
    labels:
      - traefik.enable=true
      - traefik.http.routers.changelog_app.rule=Host(`cube.${DOMAIN}`)
      - traefik.http.routers.changelog_app.entrypoints=websecure
      - traefik.http.routers.changelog_app.tls=true
    networks:
      - webgateway
    command: "npm run start"
    volumes:
      - ./:/app

networks:
  webgateway:
    name: ${NETWORK}
    external: true


