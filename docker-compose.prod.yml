services:
  cube:
    build:
      context: ./
      dockerfile: Dockerfile
    tty: true
    env_file: ".env"
    labels:
      - traefik.enable=true
      - traefik.http.routers.cube.rule=Host(`cube.${DOMAIN}`)
      - traefik.http.routers.cube.entrypoints=websecure
      - traefik.http.routers.cube.tls.certresolver=myresolver
    networks:
      - webgateway
    command: "node index.js"
    volumes:
      - ./:/app
    working_dir: /app

networks:
  webgateway:
    name: ${NETWORK}
    external: true


