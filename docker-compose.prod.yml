services:
  app:
    build:
      context: ./
      dockerfile: Dockerfile
    tty: true
    env_file: ".env"
    labels:
      - traefik.enable=true
      - traefik.http.routers.changelog_app.rule=Host(`cube.${DOMAIN}`)
      - traefik.http.routers.changelog_app.entrypoints=websecure
      - traefik.http.routers.changelog_app.tls.certresolver=myresolver
    networks:
      - webgateway
    command: "sh -c \"npm run build && npm run serve\""
    volumes:
      - ./:/app
    working_dir: /app

networks:
  webgateway:
    name: ${NETWORK}
    external: true


